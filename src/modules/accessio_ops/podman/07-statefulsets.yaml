# ── Accessio Operations - StatefulSet Workloads ───────────────────────────────
#
# PURPOSE: Deploy ultra-lightweight placeholder StatefulSets
# USAGE: Apply after deployments are created
# EFFECT: Creates minimal StatefulSets for testing purposes
# ============================================================================

# ── identityiq-ui StatefulSet ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: identityiq-ui
  namespace: prod-iga
  labels:
    app: identityiq-ui
    environment: production
    purpose: placeholder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identityiq-ui
  serviceName: identityiq-ui
  template:
    metadata:
      labels:
        app: identityiq-ui
        environment: production
        purpose: placeholder
    spec:
      containers:
      - name: identityiq-ui
        image: nginx:alpine
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

