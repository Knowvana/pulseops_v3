# ── iga-api Deployment ──────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iga-api
  namespace: prod-iga
  labels:
    app: iga-api
    environment: production
    purpose: placeholder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iga-api
  template:
    metadata:
      labels:
        app: iga-api
        environment: production
        purpose: placeholder
    spec:
      containers:
      - name: iga-api
        image: nonexistent-image:latest  # This will fail to pull
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        ports:
        - containerPort: 9999  # Invalid port for nginx
        livenessProbe:
          httpGet:
            path: /nonexistent
            port: 9999  # Invalid port and path
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /nonexistent
            port: 9999  # Invalid port and path
          initialDelaySeconds: 2
          periodSeconds: 5
          timeoutSeconds: 1
          failureThreshold: 3

