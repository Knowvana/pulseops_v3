---
# ─── StatefulSet: Elasticsearch Master ───────────────────────────────────────
# 3-node Elasticsearch cluster for search and analytics
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch-master
  namespace: prod-iga
  labels:
    app: elasticsearch-master
    component: search
    tier: data
    pulseops.io/module: google_gke
spec:
  serviceName: elasticsearch-master
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch-master
  template:
    metadata:
      labels:
        app: elasticsearch-master
        component: search
        tier: data
    spec:
      containers:
        - name: elasticsearch-master
          image: nginx:alpine
          ports:
            - containerPort: 9200
            - containerPort: 9300
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"

---
# ─── Headless Service for Elasticsearch StatefulSet ──────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-master
  namespace: prod-iga
  labels:
    app: elasticsearch-master
spec:
  clusterIP: None
  selector:
    app: elasticsearch-master
  ports:
    - name: http
      port: 9200
      targetPort: 9200
    - name: transport
      port: 9300
      targetPort: 9300
