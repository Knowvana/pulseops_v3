# =============================================================================
# Google GKE Module — Sample Workloads for Local Development
#
# PURPOSE: Deploys sample workloads that simulate the client's prod1-cluster
# components running on GKE. These use lightweight containers (nginx, busybox,
# alpine) to mimic real workloads without requiring actual application images.
#
# WORKLOADS CREATED:
#   Deployments:
#     - identityiq-ui     (2 replicas — IdentityIQ UI)
#     - identityiq-task   (2 replicas — IdentityIQ Task Service)
#     - web               (3 replicas — Web frontend)
#     - openidm           (2 replicas — OpenIDM)
#     - ig                (2 replicas — Identity Gateway)
#     - iga-api           (3 replicas — IGA API)
#     - cloudsql-proxy    (1 replica — Cloud SQL Proxy)
#
#   StatefulSets:
#     - elasticsearch-master (3 replicas — Elasticsearch cluster)
#
# WHY NGINX/ALPINE?
#   We use lightweight images because:
#   - No license fees or proprietary image access needed
#   - Fast to pull (small images)
#   - Provides real pods that respond to health checks
#   - K8s API returns the same metadata (replicas, status, events)
#   - The GKE module doesn't care what's INSIDE the container — it monitors
#     the Kubernetes resource state (replicas, ready, restarts, etc.)
#
# USAGE:
#   kubectl apply -f namespace.yaml
#   kubectl apply -f sample-workloads.yaml
#   kubectl get deployments -n accessio
#   kubectl get statefulsets -n accessio
#   kubectl get pods -n accessio
#
# =============================================================================

# ─── Deployment: IdentityIQ UI ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identityiq-ui
  namespace: prod-iga
  labels:
    app: identityiq-ui
    component: identity
    tier: frontend
    pulseops.io/module: google_gke
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identityiq-ui
  template:
    metadata:
      labels:
        app: identityiq-ui
        component: identity
        tier: frontend
    spec:
      containers:
        - name: identityiq-ui
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15

