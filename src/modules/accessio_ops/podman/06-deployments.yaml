---
# ── talend Deployment (High Resource Usage for Testing) ──────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: talend
  namespace: prod
  labels:
    app: talend
    environment: production
    purpose: placeholder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: talend
  template:
    metadata:
      labels:
        app: talend
        environment: production
        purpose: placeholder
    spec:
      containers:
      - name: talend
        image: polinux/stress
        resources:
          requests:
            memory: "2Mi"
            cpu: "2m"
          limits:
            memory: "5Mi"
            cpu: "16m"
        command: ["stress"]
        args:
          - "--cpu"
          - "1"
          - "--vm"
          - "1"
          - "--vm-bytes"
          - "3500000"
          - "--vm-hang"
          - "1"
          - "--timeout"
          - "600s"
          - "--verbose"

---
# ── iga-api Deployment (Image Pull Error) ─────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iga-api
  namespace: prod-iga
  labels:
    app: iga-api
    environment: production
    purpose: placeholder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iga-api
  template:
    metadata:
      labels:
        app: iga-api
        environment: production
        purpose: placeholder
    spec:
      containers:
      - name: iga-api
        image: nonexistent-image:latest  # This will fail to pull - ImagePullBackOff
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        ports:
        - containerPort: 9999  # Invalid port for nginx
        livenessProbe:
          httpGet:
            path: /nonexistent
            port: 9999  # Invalid port and path
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

---
# ── jobserver Deployment (Resource Quota Error) ───────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobserver
  namespace: prod
  labels:
    app: jobserver
    environment: production
    purpose: placeholder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobserver
  template:
    metadata:
      labels:
        app: jobserver
        environment: production
        purpose: placeholder
    spec:
      containers:
      - name: jobserver
        image: nginx:alpine  # Valid image
        resources:
          requests:
            memory: "16Gi"   # Excessive memory request - will cause ResourceQuota error
            cpu: "8000m"     # Excessive CPU request - will cause ResourceQuota error
          limits:
            memory: "32Gi"   # Excessive memory limit
            cpu: "16000m"    # Excessive CPU limit
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
