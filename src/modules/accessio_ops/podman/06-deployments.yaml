# ── Accessio Operations - Deployment Workloads ───────────────────────────────
#
# PURPOSE: Deploy ultra-lightweight placeholder deployments
# USAGE: Apply after namespaces and service account are created
# EFFECT: Creates minimal deployments for testing purposes
# ============================================================================

# ── jas Deployment ───────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jas
  namespace: prod-iga
  labels:
    app: jas
    environment: production
    purpose: placeholder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jas
  template:
    metadata:
      labels:
        app: jas
        environment: production
        purpose: placeholder
    spec:
      containers:
      - name: jas
        image: nginx:alpine
        resources:
          requests:
            memory: "32Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

