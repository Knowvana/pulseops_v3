# ── Accessio Operations - CronJob Workloads ───────────────────────────────────
#
# PURPOSE: Deploy ultra-lightweight placeholder CronJobs
# USAGE: Apply after StatefulSets are created
# EFFECT: Creates minimal CronJobs for testing purposes
# ============================================================================

# ── ad-link-write CronJob (Daily - Success) ───────────────────────────────────
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ad-link-write
  namespace: prod-iga
  labels:
    app: ad-link-write
    environment: production
    purpose: placeholder
    schedule: daily
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: ad-link-write
            image: busybox:1.35
            command: ["/bin/sh", "-c"]
            args:
            - |
              echo "Starting AD link write job..."
              sleep 5
              echo "AD link write completed successfully"
              exit 0
            resources:
              requests:
                memory: "16Mi"
                cpu: "5m"
              limits:
                memory: "32Mi"
                cpu: "20m"
          restartPolicy: OnFailure
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

