# ── Accessio Operations Service Account with Token ─────────────────────────────
#
# PURPOSE: Create service account and token for Accessio Operations module
# USAGE: kubectl apply -f accessio-service-account.yaml
# EFFECT: Creates service account with automatic token generation
# ============================================================================

# ── Service Account ───────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: accessio-service
  namespace: default
  labels:
    app: accessio-operations
    purpose: cluster-api-access
---
# ── Secret for Service Account Token ───────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: accessio-service-token
  namespace: default
  annotations:
    kubernetes.io/service-account.name: accessio-service
type: kubernetes.io/service-account-token
---
# ── ClusterRole (Permissions) ───────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: accessio-cluster-reader
  labels:
    app: accessio-operations
rules:
- apiGroups: [""]
  resources: ["nodes", "namespaces", "pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["extensions"]
  resources: ["deployments", "replicasets", "daemonsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods", "nodes"]
  verbs: ["get", "list"]
---
# ── ClusterRoleBinding (Grant Permissions) ───────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: accessio-cluster-reader-binding
  labels:
    app: accessio-operations
subjects:
- kind: ServiceAccount
  name: accessio-service
  namespace: default
roleRef:
  kind: ClusterRole
  name: accessio-cluster-reader
  apiGroup: rbac.authorization.k8s.io
